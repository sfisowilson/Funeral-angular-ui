<div class="onboarding-stepper-widget">
    <app-stepper-form-widget [config]="config" (signedAndCompleted)="onSignedAndCompleted($event)"></app-stepper-form-widget>

    <div class="mt-3" *ngIf="saving">
        <span class="text-muted">Saving your signature and updating your profile...</span>
    </div>

    <div class="mt-3 text-success" *ngIf="!saving && successMessage">
        {{ successMessage }}
    </div>

    <div class="mt-3 text-danger" *ngIf="!saving && errorMessage">
        {{ errorMessage }}
    </div>
</div>
