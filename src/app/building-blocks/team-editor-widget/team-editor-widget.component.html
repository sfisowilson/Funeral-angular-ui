<div class="team-editor-widget" [style.background-color]="backgroundColor">
    <h2 [style.color]="titleColor">{{ config.settings.title }}</h2>

    <div *ngIf="teamMembers.length > 0" class="team-members-list">
        <div *ngFor="let member of teamMembers" class="team-member-card" [style.background-color]="cardBackgroundColor">
            <h3 [style.color]="nameColor">{{ member.name }}</h3>
            <p><strong>Email:</strong> <span [style.color]="emailColor">{{ member.email }}</span></p>
            <p><strong>Role:</strong> <span [style.color]="roleColor">{{ member.role }}</span></p>
        </div>
    </div>

    <div *ngIf="teamMembers.length === 0">
        <p [style.color]="subtitleColor">No team members added.</p>
    </div>
</div>
