<div class="pricing-cards-widget" [style.background-color]="backgroundColor">
    <!-- Header Section -->
    <div class="text-center mb-5" *ngIf="title || subtitle">
        <h2 *ngIf="title" class="mb-3" [style.color]="titleColor">{{ title }}</h2>
        <p *ngIf="subtitle" class="lead" [style.color]="subtitleColor">{{ subtitle }}</p>
    </div>

    <!-- Billing Toggle (Optional) -->
    <div class="text-center mb-4" *ngIf="showBillingToggle">
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-secondary">Monthly</button>
            <button type="button" class="btn btn-outline-secondary">Annual</button>
        </div>
        <small class="d-block mt-2" [style.color]="subtitleColor">Save 20% with annual billing</small>
    </div>

    <!-- Pricing Cards -->
    <div class="row justify-content-center">
        <div *ngFor="let tier of tiers" [ngClass]="columnClass" class="mb-4">
            <div class="pricing-card h-100" [class.popular]="tier.isPopular" [style.background-color]="cardBackgroundColor">
                <!-- Popular Badge -->
                <div class="popular-badge" *ngIf="tier.isPopular"
                     [style.background-color]="popularBadgeBackgroundColor"
                     [style.color]="popularBadgeTextColor">
                    <i class="bi bi-star-fill"></i> Most Popular
                </div>

                <!-- Card Header -->
                <div class="card-header text-center">
                    <h3 class="tier-name mb-2" [style.color]="planNameColor">{{ tier.name }}</h3>
                    <p class="tier-description mb-0" [style.color]="descriptionColor" *ngIf="tier.description">{{ tier.description }}</p>
                </div>

                <!-- Price Section -->
                <div class="card-price text-center">
                    <div class="original-price" *ngIf="tier.originalPrice">
                        <span [style.color]="originalPriceColor" style="text-decoration: line-through">{{ tier.originalPrice }}</span>
                    </div>
                    <div class="current-price">
                        <span class="price-amount" [style.color]="priceColor">{{ tier.price }}</span>
                        <span class="price-period" [style.color]="periodColor" *ngIf="tier.pricePeriod">{{ tier.pricePeriod }}</span>
                    </div>
                </div>

                <!-- Features List -->
                <div class="card-features">
                    <ul class="list-unstyled">
                        <li *ngFor="let feature of tier.features" [class.included]="feature.included" [class.not-included]="!feature.included">
                            <i class="bi" [ngClass]="feature.included ? 'bi-check-circle-fill' : 'bi-x-circle'"
                               [style.color]="feature.included ? checkmarkColor : crossColor"></i>
                            <span [style.color]="feature.included ? featureTextColor : featureExcludedColor">{{ feature.text }}</span>
                        </li>
                    </ul>
                </div>

                <!-- CTA Button -->
                <div class="card-footer text-center" *ngIf="tier.ctaText">
                    <a [href]="tier.ctaLink || '#'" class="btn w-100"
                       [style.background-color]="tier.isPopular ? featuredButtonColor : buttonColor"
                       [style.color]="tier.isPopular ? featuredButtonTextColor : buttonTextColor"
                       [style.border-color]="tier.isPopular ? featuredButtonColor : buttonColor">
                        {{ tier.ctaText }}
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
