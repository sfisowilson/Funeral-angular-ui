<div class="hero-widget"
    [style.background-color]="config.settings.backgroundColor"
    [style.--hero-outer-padding.px]="config.settings.padding"
    [style.--hero-title-size.px]="config.settings.titleSize"
    [style.--hero-subtitle-size.px]="config.settings.subtitleSize"
    [style.--hero-btn-font-size.px]="config.settings.buttonTextSize"
    [style.--hero-btn-padding.px]="config.settings.buttonPadding">
    <h1 class="hero-title" [style.color]="config.settings.textColor">{{ config.settings.title }}</h1>
    <p class="hero-subtitle" [style.color]="config.settings.textColor">{{ config.settings.subtitle }}</p>
    <div class="btn-row">
        <a
            *ngIf="config.settings.showButton !== false"
            [href]="config.settings.buttonLink"
            [target]="config.settings.buttonTarget || '_self'"
            class="btn"
            [style.background-color]="config.settings.buttonColor"
            [style.color]="config.settings.buttonTextColor"
        >
            <i *ngIf="config.settings.buttonIcon" [class]="config.settings.buttonIcon" style="margin-right:6px"></i>
            {{ config.settings.buttonText }}
        </a>
        <a
            *ngIf="config.settings.showSecondButton"
            [href]="config.settings.secondButtonLink"
            [target]="config.settings.secondButtonTarget || '_blank'"
            class="btn btn-outline"
            [style.border-color]="config.settings.secondButtonColor || config.settings.buttonColor"
            [style.color]="config.settings.secondButtonTextColor || config.settings.buttonTextColor"
        >
            <i *ngIf="config.settings.secondButtonIcon" [class]="config.settings.secondButtonIcon" style="margin-right:6px"></i>
            {{ config.settings.secondButtonText }}
        </a>
    </div>
</div>
